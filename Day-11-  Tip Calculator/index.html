<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tip Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="calculator-container">
      <h1>Tip Calculator</h1>

      <div class="input-group">
        <label for="bill-amount">Bill Amount</label>
        <input
          type="number"
          id="bill-amount"
          placeholder="Enter the total bill"
        />
      </div>

      <div class="input-group">
        <label for="fixed-tip">Fixed Tip</label>
        <input type="number" id="fixed-tip" placeholder="e.g., 10" />
      </div>

      <div class="input-group">
        <label for="percentage-tip">Percentage Tip</label>
        <input type="number" id="percentage-tip" placeholder="e.g., 15" />
      </div>

      <div class="input-group">
        <label for="people-split">Number of People</label>
        <input
          type="number"
          id="people-split"
          placeholder="e.g., 3"
          value="1"
        />
      </div>

      <button id="calculateBtn">Calculate</button>

      <div class="result-section" id="result-section"></div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
